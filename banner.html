<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Promotion</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box {
    padding:30px;
    background:#1c1c1c;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    width:80%;
}

h2 {
    color:#ffca28;
}

p {
    margin-top:15px;
    line-height:1.6;
    color:#ccc;
}

.email {
    margin-top:20px;
    font-weight:bold;
    color:#fff;
}
</style>
</head>

<body>

<div class="box">
    <h2>Promote Your Project</h2>

    <p>
        You can place your icon on this platform as a paid promotion.
    </p>

    <p>
        Reach a global crypto audience and increase your visibility.
    </p>

    <div class="email">
        Contact: admin@pi-inu.com
    </div>
</div>

</body>
</html>
